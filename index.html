<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0c0c0c; color: #e8e8e8; overflow: hidden; }
.bridge-wrap { position: fixed; inset: 0; z-index: 0; }
.bridge-wrap svg { width: 100%; height: 100%; }
.veil {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(to bottom,
    rgba(12,12,12,0.5)  0%,
    rgba(12,12,12,0.0)  14%,
    rgba(12,12,12,0.0)  54%,
    rgba(12,12,12,0.25) 66%,
    rgba(12,12,12,0.72) 80%,
    rgba(12,12,12,1.0) 100%
  );
}
.fog-band { position: fixed; left: -5%; width: 110%; z-index: 2; border-radius: 50%; filter: blur(18px); }
.fog-band.f1 { bottom: 40%; height: 8%; background: rgba(180,180,180,0.05); animation: fogDrift 26s ease-in-out infinite alternate; }
.fog-band.f2 { bottom: 32%; height: 5%; background: rgba(160,160,160,0.035); animation: fogDrift 34s ease-in-out infinite alternate-reverse; }
.fog-band.f3 { bottom: 47%; height: 4%; background: rgba(150,150,150,0.025); animation: fogDrift 42s ease-in-out infinite alternate; }
@keyframes fogDrift {
  from { transform: translateX(0) scaleY(1); opacity: 0.6; }
  to   { transform: translateX(5%) scaleY(1.3); opacity: 1; }
}
.centre {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
}
.brand-f {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: clamp(4rem, 12vw, 11rem);
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #e8e8e8; line-height: 1;
  opacity: 0; animation: rise 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
}
.brand-amp {
  font-family: 'Cormorant', serif; font-style: italic; font-weight: 300;
  font-size: clamp(2.6rem, 6.5vw, 5.8rem);
  color: #aaa; letter-spacing: 0.05em;
  margin: 0.05em 0;
  opacity: 0; animation: rise 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
}
.brand-t {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: clamp(4rem, 12vw, 11rem);
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #e8e8e8; line-height: 1;
  opacity: 0; animation: rise 1.4s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
}
.divider {
  width: 40px; height: 0.5px; background: #404040;
  margin: 2rem auto;
  opacity: 0; animation: rise 1s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
}
.coming-soon {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: clamp(1rem, 2.2vw, 1.6rem);
  letter-spacing: 0.5em; text-transform: uppercase;
  color: #888;
  opacity: 0; animation: rise 1s cubic-bezier(0.16,1,0.3,1) 1.7s forwards;
}
.centre { padding-top: 56px; }
.domain {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: clamp(0.6rem, 1vw, 0.75rem);
  letter-spacing: 0.25em; color: #555;
  margin-top: 1rem;
  opacity: 0; animation: rise 1s cubic-bezier(0.16,1,0.3,1) 2s forwards;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
